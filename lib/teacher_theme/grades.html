<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Grades</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const loggedIn = sessionStorage.getItem('teacher_logged_in');
            if (!loggedIn) {
                window.location.href = 'login.html';
            }
        })();
    </script>
</head>
<body>

    <div class="mobile-container">
        <div class="card-glow"></div>

        <!-- Header -->
        <header class="header">
            <div class="header-title-container">
                <a href="index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <h2>Post Exam Grades</h2>
            </div>
            <button class="profile-btn" aria-label="Profile" type="button">
                <span class="profile-icon">EB</span>
            </button>
        </header>

        <!-- Filters -->
        <div class="limit-card" style="padding: 16px;">
            <div class="form-group" style="margin-bottom: 12px;">
                <label>Class Group</label>
                <select class="form-control" id="class-select" onchange="updateStudentGradesList()">
                    <option value="10a">Class 10 "A"</option>
                    <option value="11b">Class 11 "B"</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Exam Type</label>
                <select class="form-control" id="exam-select" onchange="updateStudentGradesList()">
                    <option value="ksq1">KSQ - 1</option>
                    <option value="ksq2">KSQ - 2</option>
                    <option value="bsq1">BSQ - 1</option>
                </select>
            </div>
        </div>

        <!-- Stats Overview Row -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; position: relative; z-index: 1;">
            <div style="background-color: var(--bg-surface-light); border: 1px solid var(--border-color); padding: 12px; border-radius: 16px; text-align: center;">
                <div id="avg-score" style="font-size: 20px; font-weight: 700; color: var(--accent-green);">86%</div>
                <div style="font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-top: 2px;">Average Score</div>
            </div>
            <div style="background-color: var(--bg-surface-light); border: 1px solid var(--border-color); padding: 12px; border-radius: 16px; text-align: center;">
                <div id="total-graded" style="font-size: 20px; font-weight: 700; color: var(--accent-green);">5/5</div>
                <div style="font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-top: 2px;">Graded Status</div>
            </div>
        </div>

        <!-- Student List Header -->
        <div class="limit-header" style="margin-bottom: 12px;">
            <h3 class="limit-title" style="font-size: 15px; font-weight: 700;">Student Grades</h3>
            <span class="limit-action">Max: 100 points</span>
        </div>

        <!-- Students Container with Column Headers -->
        <div class="list-container" style="margin-bottom: 30px; padding: 10px 16px;">
            <!-- Column Titles Header -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">
                <span style="flex: 1;">Student Info</span>
                <div style="display: flex; gap: 12px; width: 200px; justify-content: flex-end; text-align: center; padding-right: 6px;">
                    <span style="width: 68px; text-align: left;">Grade</span>
                    <span style="width: 50px;">Beh.</span>
                    <span style="width: 50px;">Eff.</span>
                </div>
            </div>
            
            <div id="grades-container" style="display: flex; flex-direction: column;">
                <!-- Dynamically loaded by JS -->
            </div>
        </div>

        <!-- Submit Button -->
        <div style="position: relative; z-index: 1; margin-bottom: 40px;">
            <button class="primary-btn" onclick="saveGrades()">
                Publish Student Grades
            </button>
        </div>

        <!-- Toast element -->
        <div id="toast" class="toast">
            <span id="toast-text">Success!</span>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Home</span>
            </a>
            <a href="timetable.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="nav-label">Timetable</span>
            </a>
            <a href="attendance.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                <span class="nav-label">Attendance</span>
            </a>
            <a href="homework.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <span class="nav-label">Homework</span>
            </a>
            <a href="settings.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script>
        const gradesData = {
            "10a": {
                "ksq1": [
                    { id: 1, name: "Samir Aliyev", code: "STD-292", score: 92, behavior: 95, effort: 90, initials: "SA" },
                    { id: 2, name: "Nigar Aliyeva", code: "STD-293", score: 88, behavior: 90, effort: 85, initials: "NA" },
                    { id: 3, name: "Elhan Hatamov", code: "STD-104", score: 75, behavior: 85, effort: 80, initials: "EH" },
                    { id: 4, name: "Maria Smirnova", code: "STD-342", score: 95, behavior: 98, effort: 95, initials: "MS" },
                    { id: 5, name: "Alexey Ivanov", code: "STD-851", score: 80, behavior: 80, effort: 75, initials: "AI" }
                ],
                "ksq2": [
                    { id: 1, name: "Samir Aliyev", code: "STD-292", score: 95, behavior: 97, effort: 94, initials: "SA" },
                    { id: 2, name: "Nigar Aliyeva", code: "STD-293", score: 91, behavior: 92, effort: 90, initials: "NA" },
                    { id: 3, name: "Elhan Hatamov", code: "STD-104", score: 84, behavior: 88, effort: 86, initials: "EH" },
                    { id: 4, name: "Maria Smirnova", code: "STD-342", score: 98, behavior: 99, effort: 97, initials: "MS" },
                    { id: 5, name: "Alexey Ivanov", code: "STD-851", score: 72, behavior: 80, effort: 78, initials: "AI" }
                ],
                "bsq1": [
                    { id: 1, name: "Samir Aliyev", code: "STD-292", score: 88, behavior: 90, effort: 88, initials: "SA" },
                    { id: 2, name: "Nigar Aliyeva", code: "STD-293", score: 85, behavior: 87, effort: 85, initials: "NA" },
                    { id: 3, name: "Elhan Hatamov", code: "STD-104", score: 68, behavior: 75, effort: 72, initials: "EH" },
                    { id: 4, name: "Maria Smirnova", code: "STD-342", score: 90, behavior: 93, effort: 91, initials: "MS" },
                    { id: 5, name: "Alexey Ivanov", code: "STD-851", score: 65, behavior: 70, effort: 68, initials: "AI" }
                ]
            },
            "11b": {
                "ksq1": [
                    { id: 6, name: "Jamila Mammadova", code: "STD-990", score: 96, behavior: 98, effort: 96, initials: "JM" },
                    { id: 7, name: "Tural Aliyev", code: "STD-847", score: 84, behavior: 85, effort: 82, initials: "TA" },
                    { id: 8, name: "Leyla Gasimova", code: "STD-542", score: 91, behavior: 93, effort: 90, initials: "LG" },
                    { id: 9, name: "Farid Huseynov", code: "STD-112", score: 82, behavior: 80, effort: 80, initials: "FH" }
                ],
                "ksq2": [
                    { id: 6, name: "Jamila Mammadova", code: "STD-990", score: 94, behavior: 96, effort: 93, initials: "JM" },
                    { id: 7, name: "Tural Aliyev", code: "STD-847", score: 88, behavior: 90, effort: 87, initials: "TA" },
                    { id: 8, name: "Leyla Gasimova", code: "STD-542", score: 89, behavior: 91, effort: 88, initials: "LG" },
                    { id: 9, name: "Farid Huseynov", code: "STD-112", score: 78, behavior: 80, effort: 78, initials: "FH" }
                ],
                "bsq1": [
                    { id: 6, name: "Jamila Mammadova", code: "STD-990", score: 90, behavior: 92, effort: 90, initials: "JM" },
                    { id: 7, name: "Tural Aliyev", code: "STD-847", score: 80, behavior: 82, effort: 80, initials: "TA" },
                    { id: 8, name: "Leyla Gasimova", code: "STD-542", score: 85, behavior: 88, effort: 85, initials: "LG" },
                    { id: 9, name: "Farid Huseynov", code: "STD-112", score: 75, behavior: 78, effort: 75, initials: "FH" }
                ]
            }
        };

        function getLetterGrade(score) {
            if (isNaN(score) || score === "") return "-";
            if (score >= 90) return "A";
            if (score >= 80) return "B";
            if (score >= 70) return "C";
            if (score >= 60) return "D";
            return "F";
        }

        function getGradeColor(grade) {
            switch(grade) {
                case "A": return "var(--accent-green)";
                case "B": return "#00d2d3";
                case "C": return "var(--accent-orange)";
                case "D": return "#8b5cf6";
                case "F": return "var(--accent-red)";
                default: return "var(--text-muted)";
            }
        }

        function updateStudentGradesList() {
            const classSelect = document.getElementById('class-select').value;
            const examSelect = document.getElementById('exam-select').value;
            const container = document.getElementById('grades-container');
            
            const classData = gradesData[classSelect] || {};
            const students = classData[examSelect] || [];
            
            container.innerHTML = '';
            
            students.forEach((student, index) => {
                const grade = getLetterGrade(student.score);
                const color = getGradeColor(grade);
                
                const row = document.createElement('div');
                row.className = 'student-row';
                row.style.padding = '12px 0';
                
                row.innerHTML = `
                    <div class="student-info" style="flex: 1; min-width: 0;">
                        <div class="student-avatar">${student.initials}</div>
                        <div class="student-details" style="min-width: 0; padding-right: 8px;">
                            <h4 style="font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${student.name}</h4>
                            <p style="font-size: 11px;">${student.code}</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px; width: 200px; justify-content: flex-end; align-items: center;">
                        <!-- Grade Column (50px input + 14px badge + 4px gap = 68px) -->
                        <div style="display: flex; align-items: center; gap: 4px; width: 68px; justify-content: flex-start;">
                            <input type="number" class="grade-input" min="0" max="100" value="${student.score}" 
                                   style="width: 50px; height: 32px; padding: 4px; font-size: 13px;" 
                                   data-student-id="${student.id}" oninput="handleScoreChange(this, ${index})">
                            <span class="grade-badge" style="color: ${color}; font-size: 13px; font-weight: 800; width: 14px; text-align: center;">${grade}</span>
                        </div>
                        <!-- Behavior Column (50px) -->
                        <input type="number" class="grade-input" min="0" max="100" value="${student.behavior}" 
                               style="width: 50px; height: 32px; padding: 4px; font-size: 13px; color: var(--accent-orange);" 
                               oninput="handleBehaviorChange(this, ${index})">
                        <!-- Effort Column (50px) -->
                        <input type="number" class="grade-input" min="0" max="100" value="${student.effort}" 
                               style="width: 50px; height: 32px; padding: 4px; font-size: 13px; color: #00d2d3;" 
                               oninput="handleEffortChange(this, ${index})">
                    </div>
                `;
                container.appendChild(row);
            });
            
            recalcStats(students);
        }

        function handleBehaviorChange(inputElement, index) {
            const classSelect = document.getElementById('class-select').value;
            const examSelect = document.getElementById('exam-select').value;
            const classData = gradesData[classSelect] || {};
            const students = classData[examSelect] || [];
            
            let val = parseInt(inputElement.value);
            if (isNaN(val)) val = "";
            else if (val > 100) { val = 100; inputElement.value = 100; }
            else if (val < 0) { val = 0; inputElement.value = 0; }
            
            students[index].behavior = val;
        }

        function handleEffortChange(inputElement, index) {
            const classSelect = document.getElementById('class-select').value;
            const examSelect = document.getElementById('exam-select').value;
            const classData = gradesData[classSelect] || {};
            const students = classData[examSelect] || [];
            
            let val = parseInt(inputElement.value);
            if (isNaN(val)) val = "";
            else if (val > 100) { val = 100; inputElement.value = 100; }
            else if (val < 0) { val = 0; inputElement.value = 0; }
            
            students[index].effort = val;
        }

        function handleScoreChange(inputElement, index) {
            const classSelect = document.getElementById('class-select').value;
            const examSelect = document.getElementById('exam-select').value;
            const classData = gradesData[classSelect] || {};
            const students = classData[examSelect] || [];
            
            let val = parseInt(inputElement.value);
            if (isNaN(val)) val = "";
            else if (val > 100) { val = 100; inputElement.value = 100; }
            else if (val < 0) { val = 0; inputElement.value = 0; }
            
            students[index].score = val;
            
            // Update badge next to input
            const grade = getLetterGrade(val);
            const badge = inputElement.parentElement.querySelector('.grade-badge');
            badge.textContent = grade;
            badge.style.color = getGradeColor(grade);
            
            recalcStats(students);
        }

        function recalcStats(students) {
            let total = 0;
            let count = 0;
            let gradedCount = 0;
            
            students.forEach(s => {
                if (s.score !== "") {
                    total += s.score;
                    gradedCount++;
                }
                count++;
            });
            
            const avg = gradedCount > 0 ? Math.round(total / gradedCount) : 0;
            
            document.getElementById('avg-score').textContent = `${avg}%`;
            document.getElementById('total-graded').textContent = `${gradedCount}/${count}`;
        }

        function saveGrades() {
            showToast("Grades published successfully!");
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.textContent = text;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2500);
        }

        // Initial Load
        updateStudentGradesList();
    </script>
</body>
</html>
