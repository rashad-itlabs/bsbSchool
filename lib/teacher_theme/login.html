<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <div class="mobile-container" style="justify-content: center; padding-bottom: 24px;">
        <div class="card-glow"></div>

        <!-- Logo / Title -->
        <div style="text-align: center; margin-bottom: 40px; position: relative; z-index: 1;">
            <div style="width: 70px; height: 70px; background-color: var(--accent-green); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: #000; box-shadow: 0 10px 30px var(--accent-green-glow); margin-bottom: 16px;">
                B
            </div>
            <h1 style="font-size: 24px; font-weight: 700; color: var(--text-main);">British School in Baku</h1>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 6px;">Teacher Portal Access</p>
        </div>

        <!-- Login Form Card -->
        <div class="limit-card" style="padding: 24px; margin-bottom: 0;">
            <div class="limit-header" style="margin-bottom: 20px;">
                <span class="limit-title" style="font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--accent-green); letter-spacing: 0.5px;">Sign In</span>
            </div>

            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" style="background-color: rgba(0,0,0,0.2);">
            </div>

            <!-- Password Field -->
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" style="background-color: rgba(0,0,0,0.2);">
            </div>

            <!-- Sign In Button -->
            <button class="primary-btn" onclick="validateLogin()">
                Access Portal
            </button>
        </div>

        <!-- Toast element -->
        <div id="toast" class="toast">
            <span id="toast-text">Success!</span>
        </div>
    </div>

    <script>
        function validateLogin() {
            const userField = document.getElementById('username');
            const passField = document.getElementById('password');

            const username = userField.value.trim();
            const password = passField.value;

            if (username === "Sakekh" && password === "007") {
                sessionStorage.setItem('teacher_logged_in', 'true');
                showToast("Login successful! Redirecting...");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                showToast("Invalid username or password!");
                passField.value = "";
            }
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.textContent = text;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2500);
        }

        // Support Enter key press to submit form
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validateLogin();
            }
        });
    </script>
</body>
</html>
