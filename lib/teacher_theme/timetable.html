<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Timetable</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const loggedIn = sessionStorage.getItem('teacher_logged_in');
            if (!loggedIn) {
                window.location.href = 'login.html';
            }
        })();
    </script>
</head>
<body>

    <div class="mobile-container">
        <div class="card-glow"></div>

        <!-- Header -->
        <header class="header">
            <div class="header-title-container">
                <a href="index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <h2>Weekly Timetable</h2>
            </div>
            <button class="profile-btn" aria-label="Profile" type="button">
                <span class="profile-icon">EB</span>
            </button>
        </header>

        <!-- Day Tabs -->
        <div class="day-tabs">
            <div class="day-tab active" data-day="Mon" onclick="switchDay('Mon')">Mon</div>
            <div class="day-tab" data-day="Tue" onclick="switchDay('Tue')">Tue</div>
            <div class="day-tab" data-day="Wed" onclick="switchDay('Wed')">Wed</div>
            <div class="day-tab" data-day="Thu" onclick="switchDay('Thu')">Thu</div>
            <div class="day-tab" data-day="Fri" onclick="switchDay('Fri')">Fri</div>
        </div>

        <!-- Classes Container -->
        <div class="timetable-list" id="timetable-container" style="margin-bottom: 40px; position: relative; z-index: 1;">
            <!-- Dynamically populated by JS -->
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Home</span>
            </a>
            <a href="timetable.html" class="nav-item active" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="nav-label">Timetable</span>
            </a>
            <a href="attendance.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                <span class="nav-label">Attendance</span>
            </a>
            <a href="homework.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <span class="nav-label">Homework</span>
            </a>
            <a href="settings.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1.05 1.51v.09a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script>
        const timetableData = {
            "Mon": [
                { time: "09:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 10 'A'", room: "Room 402", status: "completed" },
                { time: "10:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 11 'B'", room: "Room 402", status: "completed" },
                { time: "11:00", duration: "45 Mins", subject: "Geometry", class: "Class 10 'A'", room: "Room 403", status: "completed" }
            ],
            "Tue": [
                { time: "09:00", duration: "45 Mins", subject: "Geometry", class: "Class 11 'B'", room: "Room 403", status: "completed" },
                { time: "10:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 10 'A'", room: "Room 402", status: "completed" }
            ],
            "Wed": [
                { time: "09:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 10 'A'", room: "Room 402", status: "completed" },
                { time: "10:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 11 'B'", room: "Room 402", status: "ongoing" },
                { time: "11:00", duration: "45 Mins", subject: "Geometry", class: "Class 10 'A'", room: "Room 403", status: "upcoming" }
            ],
            "Thu": [
                { time: "10:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 10 'A'", room: "Room 402", status: "upcoming" },
                { time: "11:00", duration: "45 Mins", subject: "Geometry", class: "Class 11 'B'", room: "Room 403", status: "upcoming" }
            ],
            "Fri": [
                { time: "09:00", duration: "45 Mins", subject: "Algebra & Calculus", class: "Class 11 'B'", room: "Room 402", status: "upcoming" },
                { time: "12:00", duration: "45 Mins", subject: "Math Elective", class: "Class 10-11", room: "Room 402", status: "upcoming" }
            ]
        };

        function switchDay(day) {
            document.querySelectorAll('.day-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.day-tab[data-day="${day}"]`).classList.add('active');
            
            renderSchedule(day);
        }

        function renderSchedule(day) {
            const container = document.getElementById('timetable-container');
            const classes = timetableData[day] || [];
            
            container.innerHTML = '';
            
            if (classes.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: var(--text-muted);">
                        <div style="font-size: 32px; margin-bottom: 10px;">☕</div>
                        <div style="font-size: 14px; font-weight: 500;">No lessons scheduled for today.</div>
                    </div>
                `;
                return;
            }
            
            classes.forEach(cls => {
                const card = document.createElement('div');
                card.className = 'class-card';
                card.innerHTML = `
                    <div class="class-time">
                        <h3>${cls.time}</h3>
                        <span>${cls.duration}</span>
                    </div>
                    <div class="class-details">
                        <h4>${cls.subject}</h4>
                        <div class="class-sub">
                            <span>${cls.class}</span>
                            <span>${cls.room}</span>
                        </div>
                    </div>
                    <span class="class-status-badge status-${cls.status}">${cls.status}</span>
                `;
                container.appendChild(card);
            });
        }

        // Default load to current day of week if weekday, else Monday
        const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const todayIdx = new Date().getDay();
        let defaultDay = weekdays[todayIdx];
        if (defaultDay === "Sun" || defaultDay === "Sat") {
            defaultDay = "Mon";
        }
        
        switchDay(defaultDay);
    </script>
</body>
</html>
