<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const loggedIn = sessionStorage.getItem('teacher_logged_in');
            if (!loggedIn) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <style>
        .report-tab-selector {
            display: flex;
            background-color: var(--bg-surface-light);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }
        .report-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .report-tab.active {
            background-color: var(--accent-green);
            color: #000;
            box-shadow: 0 4px 10px var(--accent-green-glow);
        }
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s ease;
            background-color: rgba(255, 255, 255, 0.01);
        }
        .upload-zone:hover {
            border-color: var(--accent-green);
        }
        .file-selected-badge {
            background-color: rgba(177, 255, 41, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-top: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="card-glow"></div>

        <!-- Header -->
        <header class="header">
            <div class="header-title-container">
                <a href="index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <h2>Upload Reports</h2>
            </div>
            <button class="profile-btn" aria-label="Profile" type="button">
                <span class="profile-icon">EB</span>
            </button>
        </header>

        <!-- Tab Selector -->
        <div class="report-tab-selector">
            <div class="report-tab active" id="tab-weekly" onclick="switchReportTab('weekly')">Weekly Reports</div>
            <div class="report-tab" id="tab-student" onclick="switchReportTab('student')">Student Reports</div>
        </div>

        <!-- Form Card -->
        <div class="limit-card" style="padding: 20px; margin-bottom: 24px;">
            <div class="form-group">
                <label>Class Group</label>
                <select class="form-control" id="report-class" onchange="updateStudentsList()">
                    <option value="10a">Class 10 "A"</option>
                    <option value="11b">Class 11 "B"</option>
                </select>
            </div>

            <!-- Student selector - visible only for Student Reports -->
            <div class="form-group" id="student-group" style="display: none;">
                <label>Target Student</label>
                <select class="form-control" id="report-student">
                    <!-- Loaded dynamically -->
                </select>
            </div>
            
            <div class="form-group">
                <label>Report Title</label>
                <input type="text" class="form-control" id="report-title" placeholder="e.g. Week 14 Mathematics Progress">
            </div>

            <div class="form-group">
                <label>Comments / Observations</label>
                <textarea class="form-control" id="report-desc" placeholder="Provide notes or additional information..."></textarea>
            </div>

            <div class="form-group">
                <label>Report Document</label>
                <div class="upload-zone" onclick="triggerMockUpload()">
                    <div style="font-size: 24px; margin-bottom: 6px;">📄</div>
                    <div style="font-size: 12px; color: var(--text-muted);">Click to attach document (PDF / XLS)</div>
                    <div class="file-selected-badge" id="file-badge">
                        <span>✓</span> <strong id="file-name-span">report_doc.pdf</strong>
                    </div>
                </div>
            </div>

            <button class="primary-btn" onclick="submitReport()">
                Submit Report Form
            </button>
        </div>

        <!-- History Header -->
        <div class="limit-header" style="margin-bottom: 12px;">
            <h3 class="limit-title" style="font-size: 15px; font-weight: 700;">Submission History</h3>
            <span class="limit-action">Recent uploads</span>
        </div>

        <!-- Reports List -->
        <div class="list-container" id="reports-list" style="margin-bottom: 40px;">
            <!-- Dynamically populated -->
        </div>

        <!-- Toast element -->
        <div id="toast" class="toast">
            <span id="toast-text">Success!</span>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Home</span>
            </a>
            <a href="timetable.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="nav-label">Timetable</span>
            </a>
            <a href="attendance.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                <span class="nav-label">Attendance</span>
            </a>
            <a href="homework.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <span class="nav-label">Homework</span>
            </a>
            <a href="settings.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1.05 1.51v.09a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script>
        let currentTab = "weekly";
        let hasAttachment = false;

        const studentsData = {
            "10a": ["Samir Aliyev", "Nigar Aliyeva", "Elhan Hatamov", "Maria Smirnova", "Alexey Ivanov"],
            "11b": ["Jamila Mammadova", "Tural Aliyev", "Leyla Gasimova", "Farid Huseynov"]
        };

        const reports = [
            { id: 1, type: "weekly", title: "Class 10 'A' Weekly Progress - Math", date: "12 July 2026", details: "Average attendance 95%, exam scores are high.", file: "weekly_math_10a.pdf" },
            { id: 2, type: "student", title: "Student report for Samir Aliyev", date: "10 July 2026", details: "Excellent mathematical thinking shown this week.", file: "feedback_samir.pdf" }
        ];

        function switchReportTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'weekly') {
                document.getElementById('tab-weekly').classList.add('active');
                document.getElementById('student-group').style.display = 'none';
                document.getElementById('report-title').placeholder = 'e.g. Week 14 Mathematics Progress';
            } else {
                document.getElementById('tab-student').classList.add('active');
                document.getElementById('student-group').style.display = 'block';
                document.getElementById('report-title').placeholder = "e.g. Samir Aliyev behavior & work feedback";
                updateStudentsList();
            }
        }

        function updateStudentsList() {
            const classVal = document.getElementById('report-class').value;
            const studentSelect = document.getElementById('report-student');
            const students = studentsData[classVal] || [];
            
            studentSelect.innerHTML = '';
            students.forEach(student => {
                const opt = document.createElement('option');
                opt.value = student;
                opt.textContent = student;
                studentSelect.appendChild(opt);
            });
        }

        function triggerMockUpload() {
            hasAttachment = true;
            document.getElementById('file-badge').style.display = 'flex';
            showToast("Document attached successfully!");
        }

        function renderReports() {
            const container = document.getElementById('reports-list');
            container.innerHTML = '';
            
            reports.forEach(report => {
                const item = document.createElement('div');
                item.className = 'student-row';
                item.style.padding = '14px';
                item.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <span style="font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; 
                                        background-color: ${report.type === 'weekly' ? 'rgba(177, 255, 41, 0.15)' : 'rgba(16, 185, 129, 0.15)'}; 
                                        color: ${report.type === 'weekly' ? 'var(--accent-green)' : 'var(--accent-green)'};">
                                ${report.type}
                            </span>
                            <span style="font-size: 10px; color: var(--text-muted);">${report.date}</span>
                        </div>
                        <h4 style="font-size: 13px; font-weight: 600; color: var(--text-main); margin-top: 2px;">${report.title}</h4>
                        <p style="font-size: 11px; color: var(--text-muted); line-height: 1.3;">${report.details}</p>
                        ${report.file ? `<span style="font-size: 10px; color: var(--accent-green); margin-top: 2px;">📎 ${report.file}</span>` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function submitReport() {
            const titleInput = document.getElementById('report-title');
            const descInput = document.getElementById('report-desc');
            const classInput = document.getElementById('report-class');
            const studentInput = document.getElementById('report-student');
            
            if (!titleInput.value.trim()) {
                showToast("Please enter report title!");
                return;
            }

            const dateStr = new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
            
            let finalTitle = titleInput.value;
            let finalDesc = descInput.value || "Report document uploaded successfully.";
            
            if (currentTab === 'student') {
                finalTitle = `Student report for ${studentInput.value}`;
                finalDesc = `[Class ${classInput.value.toUpperCase()}] ${titleInput.value}. ${descInput.value}`;
            }

            const newReport = {
                id: Date.now(),
                type: currentTab,
                title: finalTitle,
                date: dateStr,
                details: finalDesc,
                file: hasAttachment ? "report_doc.pdf" : null
            };

            reports.unshift(newReport);
            renderReports();

            // Clear inputs
            titleInput.value = '';
            descInput.value = '';
            document.getElementById('file-badge').style.display = 'none';
            hasAttachment = false;

            showToast("Report submitted successfully!");
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.textContent = text;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2500);
        }

        // Initial Load
        renderReports();
        updateStudentsList();
    </script>
</body>
</html>
