<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Homework</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const loggedIn = sessionStorage.getItem('teacher_logged_in');
            if (!loggedIn) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <style>
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s ease, background-color 0.2s ease;
            background-color: rgba(255, 255, 255, 0.01);
            position: relative;
            z-index: 1;
        }
        .upload-zone:hover {
            border-color: var(--accent-green);
            background-color: rgba(177, 255, 41, 0.02);
        }
        .upload-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .upload-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .file-selected-badge {
            background-color: rgba(177, 255, 41, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-top: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="card-glow"></div>

        <!-- Header -->
        <header class="header">
            <div class="header-title-container">
                <a href="index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <h2>Assign Homework</h2>
            </div>
            <button class="profile-btn" aria-label="Profile" type="button">
                <span class="profile-icon">EB</span>
            </button>
        </header>

        <!-- Form Card -->
        <div class="limit-card" style="padding: 20px; margin-bottom: 24px;">
            <div class="form-group">
                <label>Class Group</label>
                <select class="form-control" id="homework-class">
                    <option value="Class 10 'A'">Class 10 "A"</option>
                    <option value="Class 11 'B'">Class 11 "B"</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Homework Title</label>
                <input type="text" class="form-control" id="homework-title" placeholder="e.g. Quadratic Equations Practice">
            </div>

            <div class="form-group">
                <label>Due Date</label>
                <input type="date" class="form-control" id="homework-date">
            </div>

            <div class="form-group">
                <label>Description / Tasks</label>
                <textarea class="form-control" id="homework-desc" placeholder="Details of the homework assignment..."></textarea>
            </div>

            <div class="form-group">
                <label>Attachment File</label>
                <div class="upload-zone" onclick="triggerMockUpload()">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Click to choose or drop PDF / Image</div>
                    <div class="file-selected-badge" id="file-badge">
                        <span>✓</span> <strong id="file-name-span">quadratic_practice.pdf</strong>
                    </div>
                </div>
            </div>

            <button class="primary-btn" onclick="submitHomework()">
                Assign Homework Task
            </button>
        </div>

        <!-- List Header -->
        <div class="limit-header" style="margin-bottom: 12px;">
            <h3 class="limit-title" style="font-size: 15px; font-weight: 700;">Active Homeworks</h3>
            <span class="limit-action">Currently Assigned</span>
        </div>

        <!-- Homework List -->
        <div class="list-container" id="homework-list" style="margin-bottom: 40px;">
            <!-- Dynamically populated -->
        </div>

        <!-- Toast element -->
        <div id="toast" class="toast">
            <span id="toast-text">Success!</span>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="nav-label">Home</span>
            </a>
            <a href="timetable.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="nav-label">Timetable</span>
            </a>
            <a href="attendance.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                <span class="nav-label">Attendance</span>
            </a>
            <a href="homework.html" class="nav-item active" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                <span class="nav-label">Homework</span>
            </a>
            <a href="settings.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1.05 1.51v.09a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="nav-label">Settings</span>
            </a>
        </nav>
    </div>

    <script>
        // Set default date to +1 day from now
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('homework-date').valueAsDate = tomorrow;

        let hasAttachment = false;

        const homeworks = [
            { id: 1, class: "Class 10 'A'", title: "Trigonometric Formulas Test Prep", date: "16 July 2026", attachment: "formulas_guide.pdf" },
            { id: 2, class: "Class 11 'B'", title: "Limits and Derivatives Worksheet", date: "18 July 2026", attachment: null }
        ];

        function triggerMockUpload() {
            hasAttachment = true;
            document.getElementById('file-badge').style.display = 'flex';
            showToast("Mock file attached successfully!");
        }

        function renderHomeworks() {
            const list = document.getElementById('homework-list');
            list.innerHTML = '';
            
            homeworks.forEach(hw => {
                const item = document.createElement('div');
                item.className = 'student-row';
                item.style.padding = '14px';
                item.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
                        <span style="font-size: 10px; color: var(--accent-green); font-weight: 700; text-transform: uppercase;">
                            ${hw.class}
                        </span>
                        <h4 style="font-size: 13px; font-weight: 600; color: var(--text-main);">${hw.title}</h4>
                        <span style="font-size: 10px; color: var(--text-muted);">
                            Due: ${hw.date} ${hw.attachment ? ' • 📎 ' + hw.attachment : ''}
                        </span>
                    </div>
                    <button onclick="deleteHomework(${hw.id})" style="background: none; border: none; color: var(--accent-red); font-size: 16px; cursor: pointer; padding: 4px;">
                        🗑️
                    </button>
                `;
                list.appendChild(item);
            });
        }

        function submitHomework() {
            const titleInput = document.getElementById('homework-title');
            const classInput = document.getElementById('homework-class');
            const dateInput = document.getElementById('homework-date');
            
            if (!titleInput.value.trim()) {
                showToast("Please enter homework title!");
                return;
            }

            // Convert date format
            const dateObj = new Date(dateInput.value);
            const formattedDate = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });

            const newHw = {
                id: Date.now(),
                class: classInput.value,
                title: titleInput.value,
                date: formattedDate,
                attachment: hasAttachment ? "quadratic_practice.pdf" : null
            };

            homeworks.unshift(newHw);
            renderHomeworks();

            // Clear inputs
            titleInput.value = '';
            document.getElementById('homework-desc').value = '';
            document.getElementById('file-badge').style.display = 'none';
            hasAttachment = false;

            showToast("Homework assigned successfully!");
        }

        function deleteHomework(id) {
            const index = homeworks.findIndex(h => h.id === id);
            if (index !== -1) {
                homeworks.splice(index, 1);
                renderHomeworks();
                showToast("Homework deleted.");
            }
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.textContent = text;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2500);
        }

        // Initial Load
        renderHomeworks();
    </script>
</body>
</html>
