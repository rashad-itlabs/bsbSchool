<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Dərslər</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .meetings-page {
            background-color: var(--bg-dark);
        }

        .meeting-card {
            background: linear-gradient(145deg, var(--bg-surface-light) 0%, var(--bg-surface) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .meeting-card.active {
            border-color: rgba(177, 255, 41, 0.3);
            box-shadow: 0 10px 30px rgba(177, 255, 41, 0.1);
        }

        .meeting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subject-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subject-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.05);
        }

        .subject-details h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .subject-details p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .meeting-status {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .status-live {
            background: rgba(177, 255, 41, 0.15);
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 1.5s infinite;
        }

        .status-upcoming {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .meeting-time {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 12px;
        }

        .meeting-time svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
        }

        .join-btn {
            width: 100%;
            min-height: 52px;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .join-btn.active {
            background: var(--accent-green);
            color: #000;
            box-shadow: 0 8px 20px rgba(177, 255, 41, 0.3);
        }

        .join-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(177, 255, 41, 0.4);
        }

        .join-btn.disabled {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.5); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="mobile-container meetings-page">
        <!-- Header -->
        <header class="schedule-header">
            <h2>Canlı Dərslər</h2>
        </header>

        <div class="section-header" style="margin-bottom: 20px; margin-top: 10px;">
            <h2 style="font-size: 16px;">İndi başlayır</h2>
        </div>

        <!-- Live Meeting -->
        <div class="meeting-card active">
            <div class="meeting-header">
                <div class="subject-info">
                    <div class="subject-icon" style="color: #00d2d3; background: rgba(0, 210, 211, 0.1);">📐</div>
                    <div class="subject-details">
                        <h3>Riyaziyyat (Cəbr)</h3>
                        <p>Müəllim: Elnur Həsənov</p>
                    </div>
                </div>
                <div class="meeting-status status-live">
                    <div class="pulse-dot"></div>
                    Canlı
                </div>
            </div>
            
            <div class="meeting-time">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                14:00 - 14:45
            </div>

            <button class="join-btn active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px;"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                Dərsə qoşul
            </button>
        </div>

        <div class="section-header" style="margin-top: 30px; margin-bottom: 20px;">
            <h2 style="font-size: 16px;">Gözlənilən dərslər</h2>
        </div>

        <!-- Upcoming Meeting -->
        <div class="meeting-card">
            <div class="meeting-header">
                <div class="subject-info">
                    <div class="subject-icon" style="color: #ff9f43; background: rgba(255, 159, 67, 0.1);">🇬🇧</div>
                    <div class="subject-details">
                        <h3>İngilis dili</h3>
                        <p>Müəllim: Aygün Quliyeva</p>
                    </div>
                </div>
                <div class="meeting-status status-upcoming">
                    15:00
                </div>
            </div>
            
            <div class="meeting-time">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                15:00 - 15:45
            </div>

            <button class="join-btn disabled" disabled>
                Otaq hələ açılmayıb
            </button>
        </div>
        
        <div class="meeting-card">
            <div class="meeting-header">
                <div class="subject-info">
                    <div class="subject-icon" style="color: #8b5cf6; background: rgba(139, 92, 246, 0.1);">🧪</div>
                    <div class="subject-details">
                        <h3>Kimya</h3>
                        <p>Müəllim: Samirə Əliyeva</p>
                    </div>
                </div>
                <div class="meeting-status status-upcoming">
                    16:00
                </div>
            </div>
            
            <div class="meeting-time">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                16:00 - 16:45
            </div>

            <button class="join-btn disabled" disabled>
                Otaq hələ açılmayıb
            </button>
        </div>

        <div style="height: 100px;"></div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span class="nav-label">Home</span>
            </a>
            <a href="idcard.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 9h10"></path><circle cx="12" cy="14" r="2"></circle><path d="M8 18h8"></path></svg><span class="nav-label">Food Card</span>
            </a>
            <!-- Central Button -->
            <a href="schedule.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 15h4M15 15h2M7 11h2M15 11h2"></path></svg><span class="nav-label">Tuition</span>
            </a>
            <a href="notifications.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span class="nav-label">Notifs</span>
            </a>
            <a href="pass.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="nav-label">Pass</span>
            </a>
        </nav>
    </div>
</body>
</html>
