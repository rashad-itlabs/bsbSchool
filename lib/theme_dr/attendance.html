<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davamiyyət</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <div class="mobile-container attendance-page">
        <!-- Header -->
        <header class="schedule-header">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <h2>Davamiyyət</h2>
            <div class="header-spacer"></div>
        </header>

        <!-- Attendance Stats -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
            <div class="service-card" style="padding: 20px; text-align: center;">
                <div style="font-size: 28px; font-weight: 700; color: var(--accent-green);">98%</div>
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px;">İştirak</div>
            </div>
            <div class="service-card" style="padding: 20px; text-align: center;">
                <div style="font-size: 28px; font-weight: 700; color: #ff6b6b;">2</div>
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px;">Qayıb</div>
            </div>
        </div>

        <!-- Monthly Overview -->
        <div class="limit-card" style="padding: 24px; margin-bottom: 30px;">
            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 20px;">May ayı üzrə icmal</h3>
            <div style="display: flex; gap: 8px; justify-content: space-between;">
                <!-- Simple dot calendar mock -->
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">B.e</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--accent-green);"></div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">Ç.a</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--accent-green);"></div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">Ç</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--accent-green);"></div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">C.a</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ff6b6b;"></div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">C</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--accent-green);"></div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">Ş</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.05);"></div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span style="font-size: 10px; color: var(--text-muted);">B</span>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.05);"></div>
                </div>
            </div>
        </div>

        <!-- Recent Logs -->
        <div class="section-header">
            <h2>Son qeydlər</h2>
        </div>

        <div class="transactions-list" style="margin-bottom: 100px;">
            <div class="transaction-item">
                <div class="tx-left">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--accent-green);"></div>
                    <div class="tx-info">
                        <h3>Məktəbə giriş</h3>
                        <p>Bu gün, 08:24</p>
                    </div>
                </div>
                <div style="font-size: 12px; color: var(--text-muted);">Zamanında</div>
            </div>
            <div class="transaction-item">
                <div class="tx-left">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background: #ff6b6b;"></div>
                    <div class="tx-info">
                        <h3>Məktəbdən çıxış</h3>
                        <p>Dünən, 15:45</p>
                    </div>
                </div>
                <div style="font-size: 12px; color: var(--text-muted);">Erkən</div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span class="nav-label">Home</span>
            </a>
            <a href="idcard.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 9h10"></path><circle cx="12" cy="14" r="2"></circle><path d="M8 18h8"></path></svg><span class="nav-label">Food Card</span>
            </a>
            <a href="schedule.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 15h4M15 15h2M7 11h2M15 11h2"></path></svg><span class="nav-label">Tuition</span>
            </a>
            <a href="notifications.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span class="nav-label">Notifs</span>
            </a>
            <a href="pass.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="nav-label">Pass</span>
            </a>
        </nav>
    </div>
</body>
</html>
