<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSB - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body class="login-body">

    <div class="mobile-container login-container">
        <!-- Language Switcher -->
        <div class="lang-switcher">
            <select id="langSelect">
                <option value="az">AZ</option>
                <option value="en">EN</option>
                <option value="ru">RU</option>
            </select>
        </div>

        <!-- School Logo -->
        <div class="login-logo-section">
            <img src="logo.png" alt="BSB Logo" class="school-main-logo">
            <h2>Xoş gəlmisiniz</h2>
            <p>Davam etmək üçün daxil olun</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm">
            <div class="input-group">
                <label>İstifadəçi adı</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input type="text" id="username" placeholder="Login" required>
                </div>
            </div>

            <div class="input-group">
                <label>Şifrə</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div id="errorMessage" style="color: #ff6b6b; font-size: 12px; margin-bottom: 15px; display: none;">
                Login və ya şifrə yanlışdır!
            </div>

            <div class="forgot-password">
                <a href="#" id="forgotPasswordBtn">Şifrəni unutmusunuz?</a>
            </div>

            <button type="submit" class="primary-btn login-submit">Daxil ol</button>
        </form>

        <!-- Copyright -->
        <footer class="login-footer">
            <p>© Copyright by AVANTGARDE Solutions</p>
        </footer>
    </div>

    <!-- Forgot Password Popup -->
    <div class="bottom-sheet-overlay" id="popupOverlay"></div>
    <div class="bottom-sheet" id="forgotPasswordSheet">
        <div class="sheet-header">
            <h3>Şifrənin bərpası</h3>
            <div class="close-btn" id="closePopup">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
        </div>
        <div class="sheet-content">
            <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">
                Şifrəni sıfırlamaq üçün qeydiyyatdan keçdiyiniz e-mail ünvanını daxil edin.
            </p>
            <div class="input-group">
                <label>E-mail ünvanı</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" id="resetEmail" placeholder="example@bsb.edu.az" required>
                </div>
            </div>
            <button type="button" class="primary-btn" id="sendResetBtn" style="margin-top: 10px;">Göndər</button>
            <div id="resetSuccess" style="color: var(--accent-green); font-size: 13px; margin-top: 15px; display: none; text-align: center;">
                Təlimatlar e-mail ünvanınıza göndərildi!
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        const popupSheet = document.getElementById('forgotPasswordSheet');
        const overlay = document.getElementById('popupOverlay');
        const closeBtn = document.getElementById('closePopup');
        const sendBtn = document.getElementById('sendResetBtn');
        const successMsg = document.getElementById('resetSuccess');

        // Авторизация
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMessage');

            if (user === 'Salekh' && pass === '123') {
                window.location.href = 'index.html';
            } else {
                error.style.display = 'block';
                setTimeout(() => error.style.display = 'none', 3000);
            }
        });

        // Открытие попапа
        forgotBtn.addEventListener('click', (e) => {
            e.preventDefault();
            overlay.classList.add('active');
            popupSheet.classList.add('active');
        });

        // Закрытие попапа
        const closePopup = () => {
            overlay.classList.remove('active');
            popupSheet.classList.remove('active');
            successMsg.style.display = 'none';
        };

        overlay.addEventListener('click', closePopup);
        closeBtn.addEventListener('click', closePopup);

        // "Отправка" пароля
        sendBtn.addEventListener('click', () => {
            const email = document.getElementById('resetEmail').value;
            if (email.includes('@')) {
                successMsg.style.display = 'block';
                setTimeout(closePopup, 2500);
            }
        });
    </script>
</body>
</html>
