<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Kart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <div class="mobile-container">
        <!-- Header -->
        <header class="schedule-header">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <h2>Mənim Food Kartım</h2>
            <div class="header-spacer"></div>
        </header>

        <!-- Virtual ID Card Slider -->
        <div class="card-slider" style="margin-top: 20px;">
            <div class="card-track" id="cardTrack">
                <!-- Daily Limit Card (Replaced Balance Card) -->
                <div>
                    <div class="limit-card" style="margin-bottom: 0; width: 100%; aspect-ratio: 1.586; display: flex; flex-direction: column; justify-content: center;">
                        <div class="limit-header">
                            <span class="limit-title">Günlük limit</span>
                            <span class="limit-edit">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                </svg>
                            </span>
                        </div>
                        
                        <div class="limit-amounts">
                            <div class="limit-spent">
                                <span class="label">Xərclənib</span>
                                <span class="value">2.50 ₼</span>
                            </div>
                            <div class="limit-remaining">
                                <span class="label">Qalıq</span>
                                <span class="value">7.50 ₼</span>
                            </div>
                        </div>
            
                        <!-- Progress Bar -->
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: 25%;"></div>
                        </div>
                        <div class="limit-total-text">Ümumi limit: 10.00 ₼</div>
                    </div>
                </div>

                <!-- Barcode Card -->
                <div>
                    <div class="card-container barcode-card">
                        <div class="card-header">
                            <div class="school-logo">STUDENT ID</div>
                            <div class="card-chip" style="background: linear-gradient(135deg, #ddd 0%, #bbb 100%);"></div>
                        </div>
                        <div class="barcode-content">
                            <img src="https://barcode.tec-it.com/barcode.ashx?data=BSB-5621-SALEKH&code=Code128&translate-esc=on" alt="Barcode" class="barcode-img">
                            <div class="barcode-number">BSB-5621-SALEKH</div>
                            <div class="scan-status">
                                <div class="pulse-dot"></div>
                                <span>Ready to Scan</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slider Pagination -->
        <div class="slider-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>

        <!-- Recent Purchases -->
        <div class="section-header" style="margin-top: 20px;">
            <h2>Son əməliyyatlar</h2>
            <a href="cafeteria.html">Hamısı</a>
        </div>

        <div class="transactions-list" style="margin-bottom: 20px;">
            <div class="transaction-item">
                <div class="tx-left">
                    <div class="tx-icon" style="color: #ff9f43; background: rgba(255, 159, 67, 0.1);">☕</div>
                    <div class="tx-info">
                        <h3>Latte</h3>
                        <p>Bu gün, 10:15</p>
                    </div>
                </div>
                <div class="tx-amount">- 2.50 ₼</div>
            </div>
            
            <div class="transaction-item">
                <div class="tx-left">
                    <div class="tx-icon" style="color: #00d2d3; background: rgba(0, 210, 211, 0.1);">🥗</div>
                    <div class="tx-info">
                        <h3>Toyuqlu salat</h3>
                        <p>Dünən, 12:30</p>
                    </div>
                </div>
                <div class="tx-amount">- 5.00 ₼</div>
            </div>

            <div class="transaction-item">
                <div class="tx-left">
                    <div class="tx-icon" style="color: #ff6b6b; background: rgba(255, 107, 107, 0.1);">🥪</div>
                    <div class="tx-info">
                        <h3>Klub sendviç</h3>
                        <p>Dünən, 09:40</p>
                    </div>
                </div>
                <div class="tx-amount">- 4.50 ₼</div>
            </div>
        </div>

        <div style="height: 80px;"></div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span class="nav-label">Home</span>
            </a>
            <a href="idcard.html" class="nav-item active" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 9h10"></path><circle cx="12" cy="14" r="2"></circle><path d="M8 18h8"></path></svg><span class="nav-label">Food Card</span>
            </a>
            <!-- Central Button -->
            <a href="schedule.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 15h4M15 15h2M7 11h2M15 11h2"></path></svg><span class="nav-label">Tuition</span>
            </a>
            <a href="notifications.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span class="nav-label">Notifs</span>
            </a>
            <a href="pass.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="nav-label">Pass</span>
            </a>
        </nav>
    </div>

    <script>
        // Card slider dots sync and navigation
        const track = document.getElementById('cardTrack');
        if (track) {
            const dots = document.querySelectorAll('.dot');

            // Sync dots on scroll
            track.addEventListener('scroll', () => {
                const index = Math.round(track.scrollLeft / track.offsetWidth);
                updateDots(index);
            });

            function updateDots(index) {
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }

            // Click on dots to navigate
            dots.forEach((dot, index) => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    track.scrollTo({
                        left: track.offsetWidth * index,
                        behavior: 'smooth'
                    });
                });
            });

            // Click on card to toggle (Desktop convenience)
            track.addEventListener('click', () => {
                const index = Math.round(track.scrollLeft / track.offsetWidth);
                const nextIndex = (index === 0) ? 1 : 0;
                track.scrollTo({
                    left: track.offsetWidth * nextIndex,
                    behavior: 'smooth'
                });
            });
        }
    </script>
</body>
</html>
