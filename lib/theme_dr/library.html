<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSB Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        .library-hero {
            background: linear-gradient(135deg, rgba(177, 255, 41, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            border-radius: 30px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        .library-hero::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent-green-glow);
            filter: blur(60px);
            opacity: 0.3;
        }
        .book-cover-premium {
            width: 100px;
            height: 140px;
            background: #2c2c30;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            position: relative;
            z-index: 1;
        }
        .genre-pill {
            padding: 10px 20px;
            background: var(--bg-surface);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }
        .genre-pill.active {
            background: var(--accent-green);
            color: #000;
            border-color: var(--accent-green);
        }
        .book-grid-vertical {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 100px;
        }
        .book-item-v {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .book-cover-main {
            width: 100%;
            aspect-ratio: 0.7;
            background: var(--bg-surface);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        .book-item-v:hover .book-cover-main {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }
        .progress-dot-container {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-dot-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <!-- Header -->
        <header class="schedule-header">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <h2>Kitabxana</h2>
            <div class="header-spacer"></div>
        </header>

        <!-- Search -->
        <div class="search-bar" style="margin-bottom: 25px; background: rgba(255,255,255,0.03); border-radius: 20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; color: var(--text-muted);">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" placeholder="Axtarış..." style="font-size: 14px;">
        </div>

        <!-- Genres -->
        <div class="filter-scroll">
            <div class="genre-pill active">Hamısı</div>
            <div class="genre-pill">Bədii</div>
            <div class="genre-pill">Elmi</div>
            <div class="genre-pill">Tarix</div>
            <div class="genre-pill">Psixologiya</div>
        </div>

        <!-- New Arrivals / All Books -->
        <div class="section-header">
            <h2>Yeni gələnlər</h2>
            <a href="#" style="font-size: 13px; color: var(--accent-green);">Hamısına bax</a>
        </div>

        <div class="book-grid-vertical">
            <!-- Book 1 -->
            <div class="book-item-v">
                <div class="book-cover-main">📕</div>
                <div style="padding: 0 4px;">
                    <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">1984</h4>
                    <p style="font-size: 11px; color: var(--text-muted);">George Orwell</p>
                </div>
            </div>
            <!-- Book 2 -->
            <div class="book-item-v">
                <div class="book-cover-main">📗</div>
                <div style="padding: 0 4px;">
                    <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Səfillər</h4>
                    <p style="font-size: 11px; color: var(--text-muted);">Viktor Hüqo</p>
                </div>
            </div>
            <!-- Book 3 -->
            <div class="book-item-v">
                <div class="book-cover-main">📘</div>
                <div style="padding: 0 4px;">
                    <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Böyük Qatsbi</h4>
                    <p style="font-size: 11px; color: var(--text-muted);">F. S. Fitzgerald</p>
                </div>
            </div>
            <!-- Book 4 -->
            <div class="book-item-v">
                <div class="book-cover-main">📖</div>
                <div style="padding: 0 4px;">
                    <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Cinayət və Cəza</h4>
                    <p style="font-size: 11px; color: var(--text-muted);">F. Dostoyevski</p>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span class="nav-label">Home</span>
            </a>
            <a href="idcard.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 9h10"></path><circle cx="12" cy="14" r="2"></circle><path d="M8 18h8"></path></svg><span class="nav-label">Food Card</span>
            </a>
            <a href="schedule.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><path d="M7 15h4M15 15h2M7 11h2M15 11h2"></path></svg><span class="nav-label">Tuition</span>
            </a>
            <a href="notifications.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span class="nav-label">Notifs</span>
            </a>
            <a href="pass.html" class="nav-item" style="text-decoration: none;">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="nav-label">Pass</span>
            </a>
        </nav>
    </div>

</body>
</html>
